name: Cleanup outdate releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cutoff_date=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          releases=$(gh release list --limit 1000 --json tagName,publishedAt -q ".[] | select(.publishedAt < \"$cutoff_date\") | .tagName")
          for tag in $releases; do
            gh release delete "$tag" --yes --cleanup-tag || true
          done
          count=${releases[@]}
          echo "ℹ️ Cleanned $count outdate release(s)"
